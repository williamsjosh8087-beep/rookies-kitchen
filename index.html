<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Rookies Kitchen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Clean, full-width top header banner -->
  <header id="nav">
    <div class="top-ticker">FRESH • FAST • FIRE</div>
    <h1>The Rookies Kitchen — Fresh, Delicious Nigerian Dishes</h1>
  </header>

  <main class="container">
    <!-- Category Tabs Navigation -->
    <nav class="menu-tabs" id="menuTabs">
      <button class="tab active" data-cat="mains">Mains</button>
      <button class="tab" data-cat="sides">Sides</button>
      <button class="tab" data-cat="drinks">Drinks</button>
    </nav>

    <!-- Food Menu Grid Display -->
    <div class="menu-grid" id="menuGrid">
      <!-- Generated by JavaScript dynamically -->
    </div>
  </main>

  <!-- Floating Cart Basket Button -->
  <button class="cart-floating-btn" id="cartBtn" aria-label="Open Cart Tray">
    <span>🛒 My Tray</span>
    <span class="cart-count" id="cartCount">0</span>
  </button>

  <!-- Slide-out Checkout Ticket Overlay -->
  <div class="ticket-overlay" id="ticketOverlay"></div>
  <div class="ticket-container" id="ticket">
    <div class="ticket-header">
      <h2>Your Tray Order</h2>
      <button class="ticket-close" id="ticketClose" aria-label="Close Order Tray">&times;</button>
    </div>
    
    <div class="ticket-body" id="ticketBody">
      <!-- Cart items populate here dynamically -->
    </div>

    <!-- Customer Details Form -->
    <div class="customer-info">
      <div class="input-group">
        <label for="custName">Your Name</label>
        <input type="text" id="custName" placeholder="Enter your full name">
      </div>
      <div class="input-group">
        <label for="custAddress">Delivery Address</label>
        <input type="text" id="custAddress" placeholder="Enter your home or office address">
      </div>
    </div>

    <!-- Pricing Summary and Send Button -->
    <div class="ticket-footer">
      <div class="total-row">
        <span>Total:</span>
        <span id="ticketTotal">₦0</span>
      </div>
      <button class="checkout-btn" id="sendOrderBtn">Confirm Order via WhatsApp 💬</button>
    </div>
  </div>

  <footer>
    <p>&copy; <span id="year"></span> The Rookies Kitchen. All Rights Reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
